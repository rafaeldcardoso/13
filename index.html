<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rafael D. Cardoso</title>
  <style>
    .site-header {
      text-align: center;
      margin-top: 20px;
    }

    .logo {
      width: 80px;        /* tamanho bom pra mobile */
      max-width: 30vw;    /* nunca fica gigante */
      height: auto;
    }

    .site-title {
      margin-top: 8px;
      font-size: 1.4rem;
      font-family: Arial, sans-serif;
    }

    h1, p {
      text-align: center;
      margin: 10px 0;
    }

    /* Estilo simples do botão */
    .botao-jogo {
      display: block;
      width: 200px;
      padding: 10px 20px;
      margin: 10px auto;
      background-color: #4CAF50;
      color: white;
      font-size: 1rem;
      text-decoration: none;
      border-radius: 6px;
      transition: background-color 0.3s;
    }

    .botao-jogo:hover {
      background-color: #45a049;
    }
    .botao-jogar {
  display: block;       /* faz o botão ocupar a linha toda */
  width: 200px;         /* você pode ajustar a largura como quiser */
  padding: 10px 20px;
  margin: 10px auto;    /* centraliza e dá espaço entre eles */
  background-color: #4CAF50;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-size: 1rem;
  text-align: center;   /* garante que o texto fique centralizado */
}

.botao-jogar:hover {
  background-color: #45a049;
}

    
  </style>
</head>
<body>

  <header class="site-header">
    <img src="images/logo.png" alt="Logo do site" class="logo">
    <h1 class="site-title">Rafael D. Cardoso</h1>
  </header>

  <h1>Jogos para pilotos</h1>
  <p></p>

  <!-- Botão simples para abrir a página do jogo -->
  <a href="jogo.html" class="botao-jogo">Quiz 1</a>
  <a href="jogo2.html" class="botao-jogar">Quiz 2</a>
  

</body>
</html>
